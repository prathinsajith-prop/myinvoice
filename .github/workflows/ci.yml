\name: CI

on:
    push:
        branches: [main, staging, development]
    pull_request:
        branches: [main, staging, development]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: "22"
    PNPM_VERSION: "10.33.0"

jobs:
    # ─────────────────────────────────────────────────────────────────────────────
    # Quality gates: lint, format check, type check
    # ─────────────────────────────────────────────────────────────────────────────
    quality:
        name: Quality Gates
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Format check
              run: pnpm format:check

            - name: Lint
              run: pnpm lint

            - name: Type check
              run: pnpm typecheck

    # ─────────────────────────────────────────────────────────────────────────────
    # Unit & integration tests
    # ─────────────────────────────────────────────────────────────────────────────
    test:
        name: Tests
        runs-on: ubuntu-latest
        needs: quality
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Generate Prisma client
              run: pnpm prisma generate

            - name: Run tests with coverage
              run: pnpm test:ci

            - name: Upload coverage report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: coverage-${{ github.sha }}
                  path: coverage/
                  retention-days: 7

    # ─────────────────────────────────────────────────────────────────────────────
    # Build verification
    # ─────────────────────────────────────────────────────────────────────────────
    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [quality, test]
        env:
            # Minimal env required for Next.js build (no real DB connection needed)
            DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/myinvoice_ci"
            DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/myinvoice_ci"
            AUTH_SECRET: "ci-secret-not-for-production-use"
            NEXTAUTH_SECRET: "ci-secret-not-for-production-use"
            NEXTAUTH_URL: "http://localhost:3000"
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Generate Prisma client
              run: pnpm prisma generate

            - name: Build
              run: pnpm build

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              if: success()
              with:
                  name: next-build-${{ github.sha }}
                  path: .next/
                  retention-days: 3

    # ─────────────────────────────────────────────────────────────────────────────
    # Security audit
    # ─────────────────────────────────────────────────────────────────────────────
    security:
        name: Security Audit
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Dependency audit
              run: pnpm audit --audit-level=high
              continue-on-error: true # warn only until audit clean

            - name: Check for secrets in code
              uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              continue-on-error: true

    # ─────────────────────────────────────────────────────────────────────────────
    # Deploy to Vercel — preview on PR, staging on staging branch, production on main
    # ─────────────────────────────────────────────────────────────────────────────
    deploy-preview:
        name: Deploy Preview
        runs-on: ubuntu-latest
        needs: build
        if: github.event_name == 'pull_request'
        environment: preview
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Deploy to Vercel (preview)
              uses: amondnet/vercel-action@v25
              with:
                  vercel-token: ${{ secrets.VERCEL_TOKEN }}
                  vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
                  vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
                  github-comment: true

    deploy-staging:
        name: Deploy Staging
        runs-on: ubuntu-latest
        needs: build
        if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
        environment: staging
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Deploy to Vercel (staging)
              uses: amondnet/vercel-action@v25
              with:
                  vercel-token: ${{ secrets.VERCEL_TOKEN }}
                  vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
                  vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}

    deploy-production:
        name: Deploy Production
        runs-on: ubuntu-latest
        needs: build
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        environment: production
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Deploy to Vercel (production)
              uses: amondnet/vercel-action@v25
              with:
                  vercel-token: ${{ secrets.VERCEL_TOKEN }}
                  vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
                  vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
                  vercel-args: "--prod"

