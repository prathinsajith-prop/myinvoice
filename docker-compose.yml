version: "3.9"

services:
  # PostgreSQL 18
  postgres:
    image: postgres:18-alpine
    container_name: myinvoice_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: myinvoice
      POSTGRES_PASSWORD: password
      POSTGRES_DB: myinvoice_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myinvoice"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - myinvoice_network

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: myinvoice_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - myinvoice_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  myinvoice_network:
    driver: bridge
